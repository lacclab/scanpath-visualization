name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/scanpath-studio
    permissions:
      id-token: write  # required for trusted publishing
      contents: write  # required to create the GitHub release
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Create GitHub release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          NOTES_FILE="$(mktemp)"
          python scripts/changelog_notes.py "$VERSION" --format markdown > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            printf 'Release %s of scanpath-studio.' "$TAG" > "$NOTES_FILE"
          fi
          printf '\n\n---\nInstall/upgrade: `pip install -U scanpath-studio`\n' >> "$NOTES_FILE"
          # Idempotent: edit notes if the release already exists, else create it.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" --verify-tag --title "$TAG" --notes-file "$NOTES_FILE"
          fi

      - name: Notify Slack
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set; skipping Slack notification."
            exit 0
          fi
          VERSION="${TAG#v}"
          URL="https://pypi.org/project/scanpath-studio/${VERSION}/"
          NOTES="$(python scripts/changelog_notes.py "$VERSION")"
          HEADER=":rocket: *scanpath-studio ${TAG}* published to PyPI"
          if [ -n "$NOTES" ]; then
            TEXT="$(printf '%s\n%s\n\n*Release notes:*\n%s' "$HEADER" "$URL" "$NOTES")"
          else
            TEXT="$HEADER — $URL"
          fi
          curl -sSf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            --data "$(jq -n --arg text "$TEXT" '{text: $text}')"
